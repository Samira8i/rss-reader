databaseChangeLog:
  - changeSet:
      id: 004-create-indexes
      author: samira
      changes:
        - createIndex:
            indexName: idx_posts_source_id
            tableName: posts
            columns:
              - column:
                  name: source_id
        - createIndex:
            indexName: idx_posts_published_at
            tableName: posts
            columns:
              - column:
                  name: published_at
        - createIndex:
            indexName: idx_rss_sources_user_id
            tableName: rss_sources
            columns:
              - column:
                  name: user_id