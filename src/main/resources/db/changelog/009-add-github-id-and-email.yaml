databaseChangeLog:
  - changeSet:
      id: 009-add-github-id-and-email
      author: samira
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: github_id
                  type: VARCHAR(255)
                  constraints:
                    unique: true
              - column:
                  name: email
                  type: VARCHAR(255)