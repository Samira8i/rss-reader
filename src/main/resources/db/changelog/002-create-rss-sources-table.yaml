databaseChangeLog:
  - changeSet:
      id: 002-create-rss-sources-table
      author: samira
      changes:
        - createTable:
            tableName: rss_sources
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_rss_sources_user
                    references: users(id)
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: url
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: last_checked_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
        - addUniqueConstraint:
            constraintName: unique_user_url
            tableName: rss_sources
            columnNames: user_id, url