databaseChangeLog:
  - changeSet:
      id: 003-create-posts-table
      author: samira
      changes:
        - createTable:
            tableName: posts
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: source_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_posts_source
                    references: rss_sources(id)
              - column:
                  name: title
                  type: VARCHAR(500)
                  constraints:
                    nullable: true
              - column:
                  name: description
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: link
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
              - column:
                  name: guid
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: published_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            constraintName: unique_source_guid
            tableName: posts
            columnNames: source_id, guid